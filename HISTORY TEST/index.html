}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),

    z-index: -1;
}

@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes slideInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes pulse {
    0%, 100% {
        box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
    }
    50% {
        box-shadow: 0 0 25px rgba(102, 126, 234, 0.8);
    }
}

@keyframes spin {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(360deg);
    }
}

@keyframes shimmer {
    0% {
        background-position: -1000px 0;
    }
    100% {
        background-position: 1000px 0;
    }
}

.container{
    width:90%;
    max-width:500px;
    background: rgba(20, 20, 60, 0.4);
    border-radius: 20px;
    padding: 40px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(102, 126, 234, 0.3);
    box-shadow: 0 8px 32px 0 rgba(102, 126, 234, 0.15), inset 0 0 20px rgba(102, 126, 234, 0.05);
    animation: fadeInDown 0.8s ease;
    position: relative;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:28px;
    font-weight:bold;
    color:#e0d5ff;
    text-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
    letter-spacing: 1px;
}

.timer{
    font-size:22px;
    font-weight:bold;
    color:#ff6b9d;
    background: rgba(102, 126, 234, 0.2);
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid rgba(102, 126, 234, 0.4);
}

.progress{
    margin-bottom:20px;
    font-size:18px;
    color: #a89cc9;
    font-weight: 500;
}

.question{
    font-size:24px;
    margin-bottom:25px;
    color:#e0d5ff;
    font-weight: 500;
    line-height: 1.6;
}

.answers{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.answer{
    padding:15px;
    border:2px solid rgba(102, 126, 234, 0.3);
    border-radius:12px;
    cursor:pointer;
    transition: all 0.3s ease;
    font-size:18px;
    background: rgba(102, 126, 234, 0.08);
    color: #c9b8e4;
    backdrop-filter: blur(5px);
    position: relative;
    overflow: hidden;
    animation: slideInUp 0.5s ease backwards;
}
.answer::before {
    content: '';
    position: absolute;
    left: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(147, 112, 219, 0.2), transparent);
    transition: left 0.5s ease;
}

.answer:hover::before {
    left: 100%;
}

.answer:hover{
    background: rgba(102, 126, 234, 0.2);
    border-color: rgba(102, 126, 234, 0.6);
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
    transform: translateX(5px);
    color: #e0d5ff;
}

.selected{
    background: rgba(102, 126, 234, 0.3);
    color:#e0d5ff;
    border-color: rgba(102, 126, 234, 0.6);
}

.answer.correct{
    background: rgba(34, 197, 94, 0.3);
    color:#86efac;
    border-color: rgba(34, 197, 94, 0.6);
}

.answer.wrong{
    background: rgba(239, 68, 68, 0.3);
    color:#fca5a5;
    border-color: rgba(239, 68, 68, 0.6);
}

.feedback{
    margin-top:15px;
    font-size:18px;
    min-height:24px;
    color: #86efac;
}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:30px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    color:white;
    font-weight: 600;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.2);
    transition: left 0.5s ease;
    z-index: -1;
}

button:hover::before {
    left: 100%;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
}

button:active {
    transform: translateY(-1px);
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#nextBtn{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
}

#nextBtn:hover{
    box-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
}

#finishBtn{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
}

#finishBtn:hover{
    box-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
}

#startBtn{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
    padding: 15px 40px;
    font-size: 20px;
}

#startBtn:hover{
    box-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
}

#authButton {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

    padding: 14px;
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
}

#authButton:hover {
    box-shadow: 0 0 30px rgba(102, 126, 234, 0.8);
}

.auth-toggle{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px 0 10px;
}

.auth-toggle button{
    background: rgba(102, 126, 234, 0.1);
    color:#c9b8e4;
    padding:10px 18px;
    border-radius:10px;
    font-size:16px;
    border:1px solid rgba(102, 126, 234, 0.2);
    backdrop-filter: blur(5px);
    transition: all 0.3s ease;
}

.auth-toggle button:hover {
    background: rgba(102, 126, 234, 0.15);
    border-color: rgba(102, 126, 234, 0.4);
}

.auth-toggle .active{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

    border-color: rgba(102, 126, 234, 0.6);

.auth-fields{

.auth-fields input{

    color: rgba(201, 184, 228, 0.5);

.auth-fields input:focus {
    outline: none;
    border-color: rgba(102, 126, 234, 0.6);
    background: rgba(102, 126, 234, 0.15);
    box-shadow: 0 0 20px rgba(102, 126, 234, 0.4), inset 0 0 10px rgba(102, 126, 234, 0.1);

    color: #e0d5ff;
}

.auth-message{
    font-size:16px;
    min-height:22px;
    color:#ff6b9d;
    text-align: center;

    padding:14px;
    margin-top:14px;
    text-align:left;
    background: rgba(102, 126, 234, 0.08);

    color: #c9b8e4;

.review-item strong{

}

.review-item p{

}

.start-screen{
    text-align:center;
    padding:40px 0;
    color: #c9b8e4;
}

.start-screen .intro{

    margin:20px 0;

.result{

.result h1{

.result p{

.restart{

.loading-spinner {

    height: 50px;

    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}

.loading-spinner.active {
    display: block;
}

.icon {
    margin-right: 8px;
    font-size: 20px;
}

@media (max-width: 768px) {
    .container {
        width: 95%;

</style>
</head>

options:["2 turga","3 turga","4 turga","5 turga"],
answer:"3 turga"
},

{

options:["Toshkent","Qo‘qon","Xiva","Buxoro"],
answer:"Buxoro"

{

options:["1 ta","2 ta","3 ta","4 ta"],
answer:"2 ta"
},

{

options:["Harbiy","Iqtisodiy","Siyosiy","Madaniy"],
answer:"Siyosiy"
},

{
question:"Qachondan boshlab yangi usul maktablarini ochish uchun ruxsatnoma olish belgilandi?",
options:["1905 yildan","1907 yildan","1909 yildan","1911 yildan"],
answer:"1909 yildan"
},

{
question:"Salohiddin domla tomonidan ikkinchi jadid maktabi qaysi shaharda ochilgan?",
options:["Toshkentda","Samarqandda","Buxoroda","Qo‘qon shahrida"],
answer:"Qo‘qon shahrida"
},

{
question:"Andijonda Shamsiddin domla va Toshkentda Mannon qori qachon jadid maktabini ochgan?",
options:["1895 yilda","1897 yilda","1899 yilda","1901 yilda"],
answer:"1899 yilda"
},
{
question:"O‘rta Osiyo jadidlarining otasi deb kim tan olingan?",

tests.sort(() => Math.random() - 0.5);

let current = 0;
let correct = 0;
let selectedAnswer = null;

const question = document.getElementById("question");
const answers = document.getElementById("answers");
const progress = document.getElementById("progress");
const feedback = document.getElementById("feedback");
const startBtn = document.getElementById("startBtn");
const nextBtn = document.getElementById("nextBtn");
const startBox = document.getElementById("startBox");
const quizBox = document.getElementById("quizBox");
const loginBox = document.getElementById("loginBox");
const showLoginBtn = document.getElementById("showLoginBtn");
const showRegisterBtn = document.getElementById("showRegisterBtn");
const usernameInput = document.getElementById("usernameInput");
const passwordInput = document.getElementById("passwordInput");
const confirmPasswordInput = document.getElementById("confirmPasswordInput");
const authButton = document.getElementById("authButton");
const authMessage = document.getElementById("authMessage");
const review = document.getElementById("review");
let timerInterval = null;
let answered = false;
let authMode = "login";
let currentUser = null;
let answerLog = [];

function setAuthMessage(text, isError = true){
  authMessage.innerText = text;
  authMessage.style.color = isError ? "#dc2626" : "#16a34a";
}

function getUsers(){
  const users = localStorage.getItem("quizUsers");
  return users ? JSON.parse(users) : {};
}

function setUsers(users){
  localStorage.setItem("quizUsers", JSON.stringify(users));
}

function switchAuthMode(mode){
  authMode = mode;
  showLoginBtn.classList.toggle("active", mode === "login");
  showRegisterBtn.classList.toggle("active", mode === "register");
  confirmPasswordInput.style.display = mode === "register" ? "block" : "none";
  authButton.textContent = mode === "login" ? "🚀 Entrance" : "✍️ Sign up";
  setAuthMessage("");
}

function showStartScreen(name){
  loginBox.style.display = "none";
  startBox.style.display = "block";
  document.querySelector("#startBox .intro").innerText = `Welcome, ${name}! Click the button to start the test.`;
}

function handleAuth(){
  const username = usernameInput.value.trim();
  const password = passwordInput.value.trim();
  const confirmPassword = confirmPasswordInput.value.trim();

  if(!username || !password){
    setAuthMessage("Please enter your username and password.");
    return;
  }

  const users = getUsers();

  if(authMode === "register"){
    if(users[username]){
      setAuthMessage("This username already exists.");
      return;
    }
    if(password !== confirmPassword){
      setAuthMessage("The passwords did not match.");
      return;
    }
    users[username] = password;
    setUsers(users);
    setAuthMessage("✅ Registration successful! Log in now.", false);
    switchAuthMode("login");
    passwordInput.value = "";
    confirmPasswordInput.value = "";
    return;
  }

  if(!users[username] || users[username] !== password){
    setAuthMessage("Invalid username or password.");
    return;
  }

  currentUser = username;
  setAuthMessage("✅ Login successful.", false);
  showStartScreen(username);
}

function loadQuestion(){

selectedAnswer = null;
answered = false;
nextBtn.disabled = true;
 feedback.innerText = "";
progress.innerHTML = `Question ${current + 1} / ${tests.length}`;
 
question.textContent = tests[current].question;

answers.innerHTML = "";

let options = [...tests[current].options];

options.sort(() => Math.random() - 0.5);

options.forEach(option => {

const div = document.createElement("div");

div.classList.add("answer");

div.innerHTML = option;

div.onclick = () => {
  if (answered) return;

  document.querySelectorAll(".answer").forEach(el=>{
    el.classList.remove("selected");
  });

  div.classList.add("selected");
selectedAnswer = option;
  nextBtn.disabled = false;
  answered = true;

  if(option === tests[current].answer){
    div.classList.add("correct");
    feedback.innerText = "To'g'ri!";
    feedback.style.color = "#16a34a";
  } else {
    div.classList.add("wrong");
    feedback.innerText = `Noto'g'ri! To'g'ri javob: ${tests[current].answer}`;
    feedback.style.color = "#dc2626";
    document.querySelectorAll(".answer").forEach(el=>{
      if(el.innerHTML === tests[current].answer){
        el.classList.add("correct");
      }
    });
  }

  document.querySelectorAll(".answer").forEach(el => {
    el.style.pointerEvents = "none";
  });

};

answers.appendChild(div);

});

}

function startTest(){
  startBox.style.display = "none";
  quizBox.style.display = "block";
  loadQuestion();
  updateTimer();
  timerInterval = setInterval(updateTimer, 1000);
}

function recordAnswer(){
  answerLog[current] = {
    question: tests[current].question,
    selected: selectedAnswer || "Tanlanmagan",
    correct: tests[current].answer
  };
}

function buildReview(){
  review.innerHTML = "";
  answerLog.forEach((item, index) => {
    const div = document.createElement("div");
    div.classList.add("review-item");
    div.innerHTML = `
      <strong>${index + 1}. ${item.question}</strong>
      <p>Tanlangan: ${item.selected}</p>
      <p>To'g'ri javob: ${item.correct}</p>
    `;
    review.appendChild(div);
  });
}

function updateTimer(){
  let minutes = Math.floor(time / 60);
  let seconds = time % 60;
  seconds = seconds < 10 ? "0" + seconds : seconds;
  timer.innerHTML = `${minutes}:${seconds}`;
  time--;
  if(time < 0){
    finishQuiz();
  }
}

showLoginBtn.onclick = () => switchAuthMode("login");
showRegisterBtn.onclick = () => switchAuthMode("register");
authButton.onclick = handleAuth;
startBtn.onclick = startTest;

document.getElementById("nextBtn").onclick = () => {
  recordAnswer();

  if(selectedAnswer === tests[current].answer){
    correct++;
  }

  current++;

  if(current >= tests.length){
    finishQuiz();
  }
  else{
    loadQuestion();
  }

};

document.getElementById("finishBtn").onclick = () => {
  recordAnswer();
  finishQuiz();
};

function finishQuiz(){

if(timerInterval){
  clearInterval(timerInterval);
}

document.getElementById("quizBox").style.display = "none";

document.getElementById("resultBox").style.display = "block";

document.getElementById("correct").innerHTML =
`Togri javoblar: ${correct}`;

document.getElementById("wrong").innerHTML =
`Xato javoblar: ${tests.length - correct}`;

document.getElementById("score").innerHTML =
`Natija: ${Math.floor((correct/tests.length)*100)}%`;

buildReview();
}



let time = 50 * 60;

const timer = document.getElementById("timer");

</script>
